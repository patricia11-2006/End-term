        // Hàm khởi tạo câu hỏi
        function loadQuiz() {
            const quizContainer = document.getElementById('quiz-questions');
            quizContainer.innerHTML = '';

            if(glossaryData.length === 0) {
                quizContainer.innerHTML = '<p style="color:red; text-align:center;">Không tìm thấy dữ liệu từ vựng hợp lệ.</p>';
                return;
            }

            glossaryData.forEach((item, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-item';

                questionDiv.innerHTML = `
                    <div class="question-text">
                        <strong>Câu ${index + 1}:</strong> ${item.definition} 
                        <br><br>➔ <input type="text" class="input-box" id="input-${index}" placeholder="Nhập từ chính xác...">
                        <span id="icon-${index}" class="result-icon"></span>
                    </div>
                    <div class="correct-answer-display" id="ans-${index}">
                        Đáp án đúng: <span style="color: #e67e22;">${item.term}</span>
                    </div>
                `;
                quizContainer.appendChild(questionDiv);
            });
        }

        // Hàm kiểm tra đáp án
        function checkAnswers() {
            let correctCount = 0;

            glossaryData.forEach((item, index) => {
                const userInput = document.getElementById(`input-${index}`).value.trim();
                const iconSpan = document.getElementById(`icon-${index}`);
                const answerDiv = document.getElementById(`ans-${index}`);

                // So khớp không phân biệt chữ hoa, chữ thường và khoảng trắng thừa
                if (userInput.toLowerCase().replace(/\s+/g, ' ') === item.term.toLowerCase().replace(/\s+/g, ' ')) {
                    iconSpan.innerHTML = " ✔ Đúng";
                    iconSpan.className = "result-icon correct-icon";
                    correctCount++;
                } else {
                    iconSpan.innerHTML = " ✘ Sai";
                    iconSpan.className = "result-icon incorrect-icon";
                }

                // Luôn hiển thị đáp án đúng sau khi nhận được đáp án của bạn
                answerDiv.style.display = "block";
            });

            // Hiển thị bảng điểm
            const scoreBoard = document.getElementById('score');
            scoreBoard.style.display = "block";
            scoreBoard.innerHTML = `Kết quả: Bạn làm đúng ${correctCount} / ${glossaryData.length} câu!`;
            
            // Cuộn xuống xem kết quả tổng quát
            scoreBoard.scrollIntoView({ behavior: 'smooth' });
        }
